name: Keep Render Server Awake (Ping)

on:
  schedule:
    # Run every 10 minutes to prevent Render free instance from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Check Endpoint
        run: |
          curl -sS -m 10 https://climbing-crm-api.onrender.com/api/health || true
          curl -sS -m 10 "https://climbing-crm-api.onrender.com/api/instagram/webhook?hub.mode=subscribe&hub.verify_token=climbing_verify_token&hub.challenge=keep_alive" || true
