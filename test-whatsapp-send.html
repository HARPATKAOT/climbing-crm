<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>בדיקת שליחת WhatsApp</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }
    label { display: block; margin-top: 16px; font-weight: bold; }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      font-size: 15px;
    }
    button {
      margin-top: 20px;
      background: #25D366;
      border: none;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      margin-top: 20px;
      padding: 14px;
      background: #020617;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note { color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>
  <h1>בדיקת שליחת WhatsApp</h1>
  <p class="note">האסימון נשאר במחשב שלך בלבד. אל תשלח אותו בצ׳אט.</p>

  <label for="token">אסימון גישה</label>
  <textarea id="token" rows="4" placeholder="הדבק כאן את האסימון"></textarea>

  <label for="phoneId">מזהה מספר</label>
  <input id="phoneId" value="1154507047738620" />

  <label for="to">מספר יעד</label>
  <input id="to" value="972508862878" />

  <label for="message">הודעה</label>
  <input id="message" value="בדיקת שליחה ישירה" />

  <button id="send">שלח בדיקה</button>
  <pre id="result">התוצאה תופיע כאן</pre>

  <script>
    document.getElementById('send').addEventListener('click', async () => {
      const token = document.getElementById('token').value.trim();
      const phoneId = document.getElementById('phoneId').value.trim();
      const to = document.getElementById('to').value.trim();
      const message = document.getElementById('message').value.trim();
      const result = document.getElementById('result');

      if (!token) {
        result.textContent = 'חסר אסימון';
        return;
      }

      result.textContent = 'שולח...';
      try {
        const response = await fetch(
          `https://graph.facebook.com/v25.0/${phoneId}/messages`,
          {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              messaging_product: 'whatsapp',
              to,
              type: 'text',
              text: { body: message },
            }),
          }
        );
        const data = await response.json();
        const info = {
          tokenLength: token.length,
          tokenStart: token.slice(0, 6),
          tokenEnd: token.slice(-4),
          httpStatus: response.status,
          response: data,
        };
        result.textContent = JSON.stringify(info, null, 2);
      } catch (error) {
        result.textContent = error.message || 'שגיאת רשת';
      }
    });
  </script>
</body>
</html>
